# TODO move all of this to tiles once tile smoothing is supported
- type: entity
  parent: BaseStructure
  id: CarpetBase
  name: carpet
  description: "Fancy walking surface."
  abstract: true
  components:
  - type: Sprite
    drawdepth: FloorTiles
  - type: Icon
    state: full
  - type: IconSmooth
    key: full
    base: carpet_
  - type: Tag
    tags:
    - Carpet
    - ForceFixRotations
  - type: Physics
    canCollide: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 5
        layer:
        - DoorPassable
  - type: Damageable
  - type: Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger: &DamageTrigger10
        !type:DamageTrigger
        damage: 10
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
  - type: TrayScanReveal
  - type: ToolRefinable
    refineResult:
    - id: MaterialCloth1

- type: entity
  id: Carpet
  parent: CarpetBase
  suffix: Red
  components:
  - type: Sprite
    sprite: Structures/Furniture/Carpets/red_carpet.rsi
  - type: Icon
    sprite: Structures/Furniture/Carpets/red_carpet.rsi
  - type: Destructible
    thresholds:
    - trigger: *DamageTrigger10
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          FloorCarpetItemRed: &BaseCarpetSpawn
            min: 1
            max: 1

- type: entity
  id: CarpetBlack
  parent: CarpetBase
  suffix: Black
