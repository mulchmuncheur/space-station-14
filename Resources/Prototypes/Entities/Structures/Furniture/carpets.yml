#cardpet

- type: entity
  parent: BaseStructure
  id: CarpetCard
  name: cardboard "carpet"
  description: "Even lino is better."
  components:
  - type: Sprite
    drawdepth: FloorTiles
    sprite: Structures/Furniture/Carpets/card_carpet.rsi
  - type: Icon
    sprite: Structures/Furniture/Carpets/card_carpet.rsi
    state: full
  - type: IconSmooth
    key: cardpets
    additionalKeys:
    - cards
    base: carpet_
  - type: Tag
    tags:
    - Carpet
    - ForceFixRotations
  - type: Physics
    canCollide: false
  - type: Clickable
  - type: Fixtures
  - type: Damageable
    damageModifierSet: Card
  - type: Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger: *DamageTrigger10
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialCardboard: *BaseCarpetSpawn
  - type: ToolRefinable
    refineResult:
    - id: MaterialCardboard1
  - type: TrayScanReveal
