- type: entity
  id: BiomassReclaimer
  parent: [ BaseMachinePowered, ConstructibleMachine, BaseConstructibleMachineDestructible ]
  name: biomass reclaimer
  description: Reclaims biomass from corpses. Gruesome.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: Structures/Machines/Medical/biomass_reclaimer.rsi
    state: icon
    snapCardinals: true
  - type: BiomassReclaimer
  - type: Climbable
    delay: 7
  - type: AmbientSound
    enabled: false
    volume: -5
    range: 5
    sound:
      path: /Audio/Ambience/Objects/reclaimer_ambience.ogg
  - type: Machine
    board: BiomassReclaimerMachineCircuitboard
  - type: GuideHelp
    guides:
    - Cloning
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 175
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
